<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Devil Runner - Pro Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; background: #87CEEB; }
        
        /* Professional Overlay Logic */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; z-index: 100;
        }

        /* Professional Home Page Background */
        #start-page { 
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: white;
            transition: opacity 0.5s ease;
        }

        /* Animated Particles for Menu */
        .particles {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(#ffffff 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            animation: move-bg 20s linear infinite;
        }

        @keyframes move-bg {
            from { background-position: 0 0; }
            to { background-position: 500px 1000px; }
        }

        /* Modern Title Styling */
        h1.title { 
            font-size: 72px; margin: 0; 
            background: linear-gradient(to bottom, #ff4d4d, #990000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 77, 77, 0.5));
            letter-spacing: 5px;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* Glowing Start Button */
        .menu-btn { 
            margin-top: 30px; padding: 18px 60px; background: #ff4d4d; border: none; 
            color: white; font-size: 24px; border-radius: 50px; cursor: pointer; 
            font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.4);
            transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        .menu-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 77, 77, 0.6); }
        .menu-btn:active { transform: scale(0.95); }

        #game-over { display: none; background: rgba(0,0,0,0.95); color: white; }

        #ui { position: absolute; top: 15px; width: 100%; text-align: center; color: white; pointer-events: none; z-index: 5; display: none; }
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 50px; box-sizing: border-box; z-index: 5; display: none; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: white; border: 1px solid rgba(255,255,255,0.3); user-select: none; }
    </style>
</head>
<body>

<div id="start-page" class="overlay">
    <div class="particles"></div>
    <h1 class="title">DEVIL RUNNER</h1>
    <p style="font-size: 18px; color: #aaa; margin-top: 10px; letter-spacing: 3px;">BEWARE OF THE TROLLS</p>
    <button class="menu-btn" onclick="startGame()">Start Adventure</button>
    <p style="position: absolute; bottom: 20px; font-size: 12px; color: #555;">v2.0 Professional Edition</p>
</div>

<div id="game-over" class="overlay">
    <h1 style="font-size: 50px; color: #ff4d4d; margin: 0;">ELIMINATED</h1>
    <h2 id="death-reason" style="color: #ff9800; margin: 10px 0;">Wajah: Spike!</h2>
    <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; min-width: 250px;">
        <p style="font-size: 22px; margin: 5px 0;">Score: <span id="final-score" style="color: #ff4d4d;">0</span></p>
        <p style="font-size: 22px; margin: 5px 0;">Coins: <span id="final-coins" style="color: gold;">0</span></p>
    </div>
    <button class="menu-btn" onclick="initGame()">Try Again</button>
</div>

<div id="ui">
    <h2 style="margin:0; font-weight: 300;">SCORE: <span id="score" style="color:#ff4d4d; font-weight: 900;">0</span> | COINS: <span id="coins" style="color:gold; font-weight: 900;">0</span></h2>
</div>

<canvas id="gameCanvas"></canvas>

<div class="controls" id="game-controls">
    <div style="display:flex; gap:30px">
        <div class="btn" id="btnLeft">←</div>
        <div class="btn" id="btnRight">→</div>
    </div>
    <div class="btn" id="btnJump">↑</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let audioCtx;

// --- SOUND ENGINE ---
function playSound(freq, type, duration, vol=0.1) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

const sounds = {
    jump: () => playSound(400, 'square', 0.2),
    coin: () => playSound(800, 'sine', 0.1, 0.2),
    die: () => playSound(100, 'sawtooth', 0.5, 0.3)
};

// --- GAME STATE ---
let gameState = 'MENU'; 
let score = 0, collectedCoins = 0, highScore = 0;
let lastGeneratedX = 0, camera = { x: 0 };
let platforms = [], hazards = [], coins = [];

const player = { x: 100, y: 200, w: 35, h: 35, vx: 0, vy: 0, speed: 7, jump: -15, grounded: false, facing: 'right', frame: 0 };
const inputs = { left: false, right: false, jump: false };

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

function startGame() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.getElementById('start-page').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('start-page').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('game-controls').style.display = 'flex';
        initGame();
    }, 500);
}

const setupBtn = (id, key) => {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', (e) => { 
        e.preventDefault(); inputs[key] = true; 
        if(key === 'jump' && player.grounded && gameState === 'PLAYING') sounds.jump();
    });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); inputs[key] = false; });
};
setupBtn('btnLeft', 'left'); setupBtn('btnRight', 'right'); setupBtn('btnJump', 'jump');

function initGame() {
    gameState = 'PLAYING';
    document.getElementById('game-over').style.display = 'none';
    platforms = [{ x: 0, y: canvas.height - 80, w: 900, h: 40, type: 'solid', color: '#444' }];
    hazards = []; coins = [];
    score = 0; collectedCoins = 0; lastGeneratedX = 900;
    player.x = 100; player.y = canvas.height - 200; player.vx = 0; player.vy = 0;
    camera.x = 0;
    generateChunks();
}

function generateChunks() {
    for(let i=0; i<8; i++) {
        let gap = 160 + Math.random() * 90;
        let width = 200 + Math.random() * 300;
        let isTroll = Math.random() < 0.45;
        let newX = lastGeneratedX + gap;
        let groundY = canvas.height - 80;

        platforms.push({ x: newX, y: groundY, originalY: groundY, w: width, h: 40, type: isTroll ? 'troll-fall' : 'solid', triggered: false, respawned: false, startTime: 0, color: '#333', shakeX: 0 });
        
        if(Math.random() > 0.3) {
            coins.push({ x: newX + width/2, y: groundY - 70, w: 20, h: 20, collected: false });
        }

        if(!isTroll && Math.random() > 0.4) {
            hazards.push({ x: newX + 50 + Math.random()*(width-100), y: groundY, w: 42, h: 38, type: 'spike' });
        }
        
        if(Math.random() > 0.7) hazards.push({ x: newX + width/2, y: -600, w: 32, h: 32, type: 'bomb', triggered: false });
        lastGeneratedX = newX + width;
    }
}

function die(reason) {
    if(gameState !== 'PLAYING') return;
    gameState = 'GAMEOVER';
    sounds.die();
    document.getElementById('final-score').innerText = score;
    document.getElementById('final-coins').innerText = collectedCoins;
    document.getElementById('death-reason').innerText = reason;
    document.getElementById('game-over').style.display = 'flex';
}

function update() {
    if(gameState !== 'PLAYING') return;

    player.vx = inputs.left ? -player.speed : (inputs.right ? player.speed : 0);
    if(inputs.left) player.facing = 'left'; if(inputs.right) player.facing = 'right';
    if (inputs.jump && player.grounded) { player.vy = player.jump; player.grounded = false; }

    player.vy += 0.75; player.x += player.vx; player.y += player.vy;
    camera.x += (player.x - canvas.width/3 - camera.x) * 0.1;
    if(camera.x < 0) camera.x = 0;
    if (camera.x + canvas.width > lastGeneratedX - 1200) generateChunks();

    score = Math.max(score, Math.floor(player.x / 100));
    document.getElementById('score').innerText = score;
    document.getElementById('coins').innerText = collectedCoins;

    player.grounded = false;

    platforms.forEach(p => {
        if (p.type === 'troll-fall' && !p.respawned && player.x > p.x - 70 && !p.triggered) { p.triggered = true; p.startTime = Date.now(); }
        if (p.triggered && !p.respawned) {
            let elapsed = (Date.now() - p.startTime) / 1000;
            if (elapsed < 0.5) { p.color = "#ff9800"; p.shakeX = Math.sin(Date.now() * 0.2) * 8; }
            else { p.color = "#ff4d4d"; p.y += 25; p.shakeX = 0; if (p.y > canvas.height + 200) { p.y = p.originalY; p.color = "#333"; p.type = "solid"; p.respawned = true; } }
        }
        let dX = p.x + (p.shakeX || 0);
        if (player.x < dX + p.w && player.x + player.w > dX && player.y < p.y + p.h && player.y + player.h > p.y) {
            if (player.vy > 0 && player.y + player.h - player.vy <= p.y + 15) { player.y = p.y - player.h; player.vy = 0; player.grounded = true; }
        }
    });

    coins.forEach(c => {
        if(!c.collected && player.x < c.x + c.w && player.x + player.w > c.x && player.y < c.y + c.h && player.y + player.h > c.y) {
            c.collected = true; collectedCoins++; sounds.coin();
        }
    });

    hazards.forEach(h => {
        if (h.type === 'bomb' && player.x > h.x - 350) h.triggered = true;
        if (h.triggered && h.type === 'bomb') h.y += 18;
        if (player.x + 5 < h.x + h.w && player.x + player.w - 5 > h.x && player.y + 5 < h.y + h.h && player.y + player.h - 5 > (h.type === 'spike' ? h.y - h.h : h.y)) die(h.type === 'spike' ? "Spike se takraye!" : "Bomb gira!");
    });

    if (player.y > canvas.height + 100) die("Niche gir gaye!");
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Background Subtle Grid
    ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
    for (let i = -(camera.x % 100); i < canvas.width; i += 100) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }

    ctx.save(); ctx.translate(-camera.x, 0);

    platforms.forEach(p => { 
        ctx.fillStyle = p.color; 
        ctx.fillRect(p.x + (p.shakeX || 0), p.y, p.w, p.h); 
        // Platform top highlight
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        ctx.fillRect(p.x + (p.shakeX || 0), p.y, p.w, 5);
    });

    coins.forEach(c => { 
        if(!c.collected) { 
            ctx.fillStyle = "gold"; ctx.beginPath(); ctx.arc(c.x+10, c.y+10, 10, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "orange"; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.fillRect(c.x+6, c.y+6, 4, 4); // Shine
        }
    });

    hazards.forEach(h => {
        if(h.type === 'spike') {
            ctx.fillStyle = "#7a0000"; ctx.beginPath(); ctx.moveTo(h.x-3, h.y); ctx.lineTo(h.x+h.w/2, h.y-h.h-5); ctx.lineTo(h.x+h.w+3, h.y); ctx.fill();
            ctx.fillStyle = "#ff1a1a"; ctx.beginPath(); ctx.moveTo(h.x, h.y); ctx.lineTo(h.x+h.w/2, h.y-h.h); ctx.lineTo(h.x+h.w, h.y); ctx.fill();
        } else { 
            ctx.fillStyle = "#111"; ctx.beginPath(); ctx.arc(h.x+16, h.y+16, 20, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = "red"; ctx.fillRect(h.x+13, h.y-10, 6, 12);
        }
    });

    // Character
    player.frame += 0.18;
    ctx.save();
    let s = Math.sin(player.frame) * 2.5;
    ctx.translate(player.x + player.w/2, player.y + player.h/2);
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.roundRect(-player.w/2, -(player.h-s)/2, player.w, player.h-s, 10); ctx.fill();
    ctx.fillStyle = 'white'; let eO = player.facing === 'right' ? 6 : -14; let blink = Math.sin(player.frame * 0.4) > 0.92 ? 2 : 9;
    ctx.fillRect(eO, -9, 8, blink); ctx.fillRect(eO + 11, -9, 8, blink); ctx.restore();

    ctx.restore();
    
    if(gameState === 'PLAYING') update();
    requestAnimationFrame(draw);
}

resize();
draw();
</script>
</body>
</html>
